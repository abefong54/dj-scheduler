# backend/railway.toml
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "./server"
# /healthz is unauthenticated and returns 200; /api/events is behind the JWT
# auth middleware and returns 401 without a token, which would fail every
# Railway health check and mark healthy deploys as unhealthy.
healthcheckPath = "/healthz"
healthcheckTimeout = 10
