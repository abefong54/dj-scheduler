<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Pending">
  <title>Half-meter (filled / Pending)</title>
  <!-- EL-073 domain icon. Filled = active/status. Pending amber #F5B544 is
       status-semantic (colour carries meaning), so it is baked in here.
       The meter capsule outlined, filled to the half mark. Pair with a text
       label per the design system (status is never colour-alone). -->
  <g fill="none" stroke="#F5B544" stroke-width="1.75" stroke-linejoin="round">
    <rect x="8.5" y="3" width="7" height="18" rx="3.5"/>
  </g>
  <rect x="10.25" y="11" width="3.5" height="8" rx="1.75" fill="#F5B544"/>
</svg>
