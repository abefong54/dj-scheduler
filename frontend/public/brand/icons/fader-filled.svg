<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Faders">
  <title>Fader (filled)</title>
  <!-- EL-073 domain icon. Filled variant = active/selected. Thin tracks with
       solid handles. currentColor so it inherits the token colour in use. -->
  <g stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
    <line x1="8"  y1="4" x2="8"  y2="20"/>
    <line x1="16" y1="4" x2="16" y2="20"/>
  </g>
  <g fill="currentColor">
    <rect x="4.5"  y="7.25"  width="7" height="3.5" rx="1.75"/>
    <rect x="12.5" y="13.25" width="7" height="3.5" rx="1.75"/>
  </g>
</svg>
