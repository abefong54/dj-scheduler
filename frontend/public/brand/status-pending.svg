<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-label="Pending">
  <title>Status: Pending</title>
  <!-- Half-meter: the level sits low / mid — the climb hasn't completed yet.
       Pending amber (distinct from Cue Amber). Pair with a text label. -->
  <g fill="#F5B544">
    <rect x="3"  y="14" width="4" height="5" rx="2"/>
    <rect x="8"  y="15" width="4" height="4" rx="2"/>
    <rect x="13" y="12" width="4" height="7" rx="2"/>
    <rect x="18" y="10" width="4" height="9" rx="2"/>
  </g>
</svg>
