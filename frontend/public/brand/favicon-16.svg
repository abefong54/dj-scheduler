<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Soundcheck">
  <title>Soundcheck favicon (16px-simplified)</title>
  <rect x="0" y="0" width="32" height="32" rx="7" fill="#0B0D10"/>
  <!-- Low-detail variant: 4 bolder bars so the shape stays a legible
       waveform-check at 16px instead of muddying into a plain tick. -->
  <g fill="#FF9E2C">
    <rect x="4.5"  y="17" width="5" height="8"  rx="2.5"/>
    <rect x="11.5" y="20" width="5" height="5"  rx="2.5"/>
    <rect x="18.5" y="12" width="5" height="13" rx="2.5"/>
    <rect x="24.5" y="6"  width="5" height="19" rx="2.5"/>
  </g>
</svg>
