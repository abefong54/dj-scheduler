@if (dialog.state()) {
  <div class="modal-overlay" (click)="dialog.state()!.type === 'alert' && dialog.respond(true)">
    <div class="dialog-box" (click)="$event.stopPropagation()">

      <h2 class="dialog-title">{{ dialog.state()!.title }}</h2>
      <p class="dialog-message">{{ dialog.state()!.message }}</p>

      <div class="dialog-actions">
        @if (dialog.state()!.type === 'confirm') {
          <app-button [label]="dialog.state()!.cancelLabel ?? ('actions.cancel' | translate)"
            testId="dialog-cancel-btn" (click)="dialog.respond(false)" />
          <app-button [variant]="dialog.state()!.variant === 'danger' ? 'danger' : 'primary'"
            [label]="dialog.state()!.confirmLabel ?? ('actions.confirm' | translate)"
            testId="dialog-confirm-btn" (click)="dialog.respond(true)" />
        } @else {
          <app-button variant="primary"
            [label]="dialog.state()!.confirmLabel ?? ('actions.ok' | translate)"
            testId="dialog-ok-btn" (click)="dialog.respond(true)" />
        }
      </div>

    </div>
  </div>
}
