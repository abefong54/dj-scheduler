<div class="page-sm">
  <div class="page-header">
    <h1 class="page-title">{{ 'slots.new' | translate }}</h1>
    <a [routerLink]="['/admin/events', eventId]" class="back-link">← {{ 'actions.back' | translate }}</a>
  </div>

  <form (ngSubmit)="submit()" class="slot-form">
    <div>
      <label class="form-label">{{ 'slots.stage' | translate }}</label>
      <select [(ngModel)]="stage_id" name="stage_id" required class="form-select">
        <option value="" disabled>— select —</option>
        @for (s of stages(); track s.id) {
          <option [value]="s.id">{{ s.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="form-label">{{ 'slots.dj' | translate }}</label>
      <select [(ngModel)]="dj_id" name="dj_id" class="form-select">
        <option value="">{{ 'slots.unassigned' | translate }}</option>
        @for (d of djs(); track d.id) {
          <option [value]="d.id">{{ d.name }}</option>
        }
      </select>
    </div>

    <div>
      <label class="form-label">{{ 'slots.genre' | translate }}</label>
      <input [(ngModel)]="genre" name="genre" type="text" class="form-input" placeholder="e.g. Hip Hop" />
    </div>

    <div>
      <label class="form-label">{{ 'slots.date' | translate }}</label>
      <input [(ngModel)]="slot_date" name="slot_date" type="date" class="form-input" required />
    </div>

    <div class="form-grid-2">
      <div>
        <label class="form-label">{{ 'slots.start' | translate }}</label>
        <input [(ngModel)]="start_time" name="start_time" type="time" class="form-input" required />
      </div>
      <div>
        <label class="form-label">{{ 'slots.end' | translate }}</label>
        <input [(ngModel)]="end_time" name="end_time" type="time" class="form-input" required />
      </div>
    </div>

    <div>
      <label class="form-label">{{ 'slots.notes' | translate }}</label>
      <textarea [(ngModel)]="notes" name="notes" rows="3" class="form-textarea"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">{{ 'actions.create' | translate }}</button>
      <a [routerLink]="['/admin/events', eventId]" class="btn-secondary">{{ 'actions.cancel' | translate }}</a>
    </div>
  </form>
</div>
