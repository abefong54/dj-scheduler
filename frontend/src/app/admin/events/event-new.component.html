<app-admin-shell activeNav="events" [title]="'events.new' | translate">
  <form (ngSubmit)="submit()" class="console-card" novalidate>
    <div class="console-field">
      <label class="console-label" for="event-name">{{ 'events.name' | translate }}</label>
      <input id="event-name" [(ngModel)]="name" name="name" type="text"
        class="console-input" required data-testid="event-name-input" />
    </div>

    <div class="console-field">
      <label class="console-label" for="event-venue">{{ 'events.venue' | translate }}</label>
      <input id="event-venue" [(ngModel)]="venue_name" name="venue_name" type="text"
        class="console-input" required data-testid="event-venue-input" />
    </div>

    <div class="console-field console-grid-2">
      <div>
        <label class="console-label" for="event-start">{{ 'events.startDate' | translate }}</label>
        <input id="event-start" [(ngModel)]="start_date" name="start_date" type="date"
          class="console-input" required data-testid="event-start-date" />
      </div>
      <div>
        <label class="console-label" for="event-end">{{ 'events.endDate' | translate }}</label>
        <input id="event-end" [(ngModel)]="end_date" name="end_date" type="date"
          class="console-input" required data-testid="event-end-date" />
      </div>
    </div>

    <div class="console-field">
      <label class="console-label" for="event-genres">{{ 'events.genres' | translate }}</label>
      <input id="event-genres" [(ngModel)]="genres_input" name="genres_input" type="text"
        class="console-input" placeholder="e.g. Hip Hop, R&B, Trap" data-testid="event-genres-input" />
    </div>

    <div class="console-actions">
      <a routerLink="/admin/events" class="console-btn-secondary" data-testid="event-cancel-btn">
        {{ 'actions.cancel' | translate }}
      </a>
      <button type="submit" class="console-btn-primary" data-testid="event-create-btn">
        {{ 'actions.create' | translate }}
      </button>
    </div>
  </form>
</app-admin-shell>
