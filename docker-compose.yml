# docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eventlineup
      POSTGRES_PASSWORD: eventlineup
      POSTGRES_DB: eventlineup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventlineup"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot goose migration runner. Replaces the old
  # ./backend/migrations:/docker-entrypoint-initdb.d mount, so local dev migrates
  # by exactly the same goose path as production (EL-056) instead of postgres's
  # first-boot init hook. Runs `go run` against the embedded migrations; the api
  # service waits for it to finish successfully before starting.
  migrate:
    image: golang:1.26-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - gomodcache:/go/pkg/mod
    environment:
      DATABASE_URL: postgresql://eventlineup:eventlineup@db:5432/eventlineup
    command: ["go", "run", "./cmd/migrate", "up"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://eventlineup:eventlineup@db:5432/eventlineup
      PORT: "8080"
      FRONTEND_URL: "http://localhost:4200"
      # Local-dev only — 32-byte (64 hex char) AES-256 key for encrypting LINE
      # Notify tokens at rest. Generate a real key per environment in production
      # (e.g. `openssl rand -hex 32`); never reuse this placeholder.
      LINE_NOTIFY_ENCRYPTION_KEY: "1111111111111111111111111111111111111111111111111111111111111111"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  gomodcache:
